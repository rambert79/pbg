<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Card Memory - PBG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --primary: #0f3460;
  --gold: #e2b96f;
  --gold-dark: #c49a4f;
  --team-a: #3b82f6;
  --team-b: #ef4444;
  --card-back-bg: #fffde7;
  --card-front-bg: #fdf6e3;
  --cream: #fdf6e3;
  --sky: #87ceeb;
  --text: #1e293b;
  --card-size: min(calc((100vw - 72px) / 6), calc((100vh - 172px) / 4));
}
body {
  font-family: 'Pretendard', system-ui, sans-serif;
  background: var(--bg);
  color: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.5s ease;
}

/* ── TEAM BG ── */
body.turn-a {
  background: linear-gradient(160deg, #0a1628 0%, #0d2050 40%, #1a1a2e 100%);
}
body.turn-b {
  background: linear-gradient(160deg, #280a0a 0%, #501010 40%, #1a1a2e 100%);
}

/* ── HEADER ── */
#header {
  width: 100%;
  background: var(--surface);
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
  transition: border-color 0.5s, background 0.5s;
  gap: 0.5rem;
}
body.turn-a #header { border-bottom-color: var(--team-a); background: rgba(10,22,40,0.95); }
body.turn-b #header { border-bottom-color: var(--team-b); background: rgba(40,10,10,0.95); }
#header h1 { font-size: 1.2rem; color: var(--gold); flex: 1; text-align: center; }
#back-btn {
  background: none; border: 1px solid var(--gold);
  color: var(--gold); padding: 0.3rem 0.8rem;
  border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem;
  white-space: nowrap;
}
#back-btn:hover { background: var(--gold); color: #000; }
#home-btn {
  background: none; border: 1px solid #64748b;
  color: #94a3b8; padding: 0.3rem 0.8rem;
  border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
  white-space: nowrap;
}
#home-btn:hover { background: #64748b; color: #fff; }

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 900px; padding: 2rem 1rem; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ── MAIN SCREEN (difficulty) ── */
#difficulty-title { font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; text-align: center; }
#difficulty-sub { font-size: 0.95rem; opacity: 0.7; margin-bottom: 2rem; text-align: center; }
.diff-cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
.diff-card {
  background: var(--surface);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 1.5rem;
  padding: 2.5rem 2rem;
  width: 240px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}
.diff-card:hover { transform: translateY(-8px); }
.diff-card.easy:hover { border-color: #4caf50; box-shadow: 0 0 20px #4caf5066; }
.diff-card.mid:hover { border-color: #ffd700; box-shadow: 0 0 20px #ffd70066; }
.diff-card.hard:hover { border-color: #ef4444; box-shadow: 0 0 20px #ef444466; }
.diff-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.diff-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
.diff-desc { font-size: 0.95rem; opacity: 0.8; line-height: 1.5; }
.diff-badge {
  display: inline-block; margin-top: 1rem;
  padding: 0.4rem 1.2rem; border-radius: 1rem;
  font-size: 0.85rem; font-weight: 700;
}
.easy .diff-badge { background: #4caf50; color: #fff; }
.mid .diff-badge { background: #ffd700; color: #000; }
.hard .diff-badge { background: #ef4444; color: #fff; }

/* ── TEAM INPUT SCREEN ── */
#team-screen h2 { font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; }
#team-screen .team-subtitle { font-size: 1rem; opacity: 0.7; margin-bottom: 2rem; text-align: center; }
.team-inputs { display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
.team-input-box {
  display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
  background: var(--surface);
  border-radius: 1.5rem;
  padding: 2rem 2.5rem;
  min-width: 210px;
}
.team-input-box.a { border: 3px solid var(--team-a); }
.team-input-box.b { border: 3px solid var(--team-b); }
.team-badge {
  display: flex; align-items: center; justify-content: center;
  width: 60px; height: 60px; border-radius: 50%;
  font-size: 1.8rem; font-weight: 900;
}
.team-badge.a { background: rgba(59,130,246,0.15); color: var(--team-a); border: 3px solid var(--team-a); }
.team-badge.b { background: rgba(239,68,68,0.15); color: var(--team-b); border: 3px solid var(--team-b); }
.team-input-box label { font-size: 1.1rem; font-weight: 700; }
.team-a-label { color: var(--team-a); }
.team-b-label { color: var(--team-b); }
.team-input-box input {
  padding: 0.8rem 1rem; border-radius: 0.8rem;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 1.3rem; text-align: center; width: 200px;
}
.team-input-box.a input:focus { border-color: var(--team-a); outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
.team-input-box.b input:focus { border-color: var(--team-b); outline: none; box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }
#start-game-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e; border: none; padding: 1.2rem 4rem;
  border-radius: 1.5rem; font-size: 1.4rem; font-weight: 900;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(226,185,111,0.4);
  letter-spacing: 0.05em;
}
#start-game-btn:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(226,185,111,0.6); }

/* ── SCOREBOARD ── */
#scoreboard {
  width: 100%; max-width: 100%;
  display: flex; gap: 1rem; padding: 0.8rem 1rem;
  justify-content: space-between; align-items: center;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  transition: background 0.5s, border-color 0.5s;
  position: sticky; top: 0; z-index: 10;
}
body.turn-a #scoreboard { background: rgba(10,22,40,0.97); border-bottom-color: var(--team-a); }
body.turn-b #scoreboard { background: rgba(40,10,10,0.97); border-bottom-color: var(--team-b); }
.score-box {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 0.5rem 1rem; border-radius: 0.8rem;
  transition: all 0.3s;
}
.score-box.active-turn { transform: scale(1.08); }
.score-box.a { border: 2px solid var(--team-a); }
.score-box.b { border: 2px solid var(--team-b); }
.score-box.a.active-turn { background: rgba(59,130,246,0.25); box-shadow: 0 0 20px rgba(59,130,246,0.5); border-width: 3px; }
.score-box.b.active-turn { background: rgba(239,68,68,0.25); box-shadow: 0 0 20px rgba(239,68,68,0.5); border-width: 3px; }
.score-team-name { font-size: 0.9rem; font-weight: 700; }
.score-num { font-size: 2rem; font-weight: 900; }
.score-box.a .score-team-name { color: var(--team-a); }
.score-box.b .score-team-name { color: var(--team-b); }
.score-box.a .score-num { color: var(--team-a); }
.score-box.b .score-num { color: var(--team-b); }
#turn-indicator {
  font-size: 1rem; text-align: center; font-weight: 700;
  padding: 0.5rem 1rem; border-radius: 1rem;
  transition: all 0.5s; min-width: 130px;
}
body.turn-a #turn-indicator { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid var(--team-a); }
body.turn-b #turn-indicator { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid var(--team-b); }

/* ── SIDE BARS ── */
.team-side-bar {
  position: fixed; top: 0; width: 6px; height: 100%;
  z-index: 5; opacity: 0; transition: opacity 0.5s;
  pointer-events: none;
}
.team-side-bar.left { left: 0; }
.team-side-bar.right { right: 0; }
body.turn-a .team-side-bar.left { background: var(--team-a); box-shadow: 0 0 20px var(--team-a); opacity: 1; }
body.turn-b .team-side-bar.right { background: var(--team-b); box-shadow: 0 0 20px var(--team-b); opacity: 1; }

/* ── GAME BOARD ── */
#game-screen { gap: 0; padding: 0; }
#board-wrap { width: 100%; max-width: 100%; padding: 0.8rem 1rem; }
#board {
  display: grid;
  gap: 8px;
  justify-content: center;
}

/* ── CARDS ── */
.card {
  width: var(--card-size); height: var(--card-size);
  cursor: pointer;
  perspective: 600px;
  position: relative;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 0.8rem;
  overflow: hidden;
}

/* BACK FACE */
.card-back {
  background: linear-gradient(145deg, #b8d9f0 0%, #87c3e8 40%, #a8d4f0 100%);
  border: 4px solid #f0c040;
  box-shadow:
    inset 0 0 0 3px #fff,
    0 6px 16px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-back-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.12) 18px, rgba(255,255,255,0.12) 19px),
    repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.12) 18px, rgba(255,255,255,0.12) 19px);
  pointer-events: none;
  z-index: 0;
}
.card-back-pattern {
  display: flex !important;
  position: absolute;
  width: 72%; height: 72%;
  border-radius: 50%;
  background: radial-gradient(circle, #f5f0e0 0%, #ddeeff 55%, transparent 75%);
  border: 2px solid rgba(100,160,220,0.4);
  box-shadow: 0 0 0 4px rgba(100,160,220,0.15);
  align-items: center;
  justify-content: center;
  z-index: 1;
  overflow: visible;
}
.card-back-pattern::before {
  content: '';
  position: absolute;
  width: 80%; height: 80%;
  border-radius: 50%;
  border: 1.5px dashed rgba(100,160,220,0.35);
}
.card-back-corner {
  position: absolute;
  font-size: calc(var(--card-size) * 0.11);
  line-height: 1;
  z-index: 3;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}
.card-back-corner.tl { top: 5%; left: 5%; }
.card-back-corner.tr { top: 5%; right: 5%; }
.card-back-corner.bl { bottom: 5%; left: 5%; }
.card-back-corner.br { bottom: 5%; right: 5%; }
.card-number {
  font-size: calc(var(--card-size) * 0.38);
  font-weight: 900;
  font-family: 'Arial Black', 'Arial Bold', 'Impact', sans-serif;
  background: linear-gradient(180deg, #ffe57a 0%, #f5c842 40%, #e0a020 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter:
    drop-shadow(-2px -2px 0 #4a90d9)
    drop-shadow(2px -2px 0 #4a90d9)
    drop-shadow(-2px 2px 0 #4a90d9)
    drop-shadow(2px 2px 0 #4a90d9);
  z-index: 2;
  position: relative;
}

/* FRONT FACE */
.card-front {
  transform: rotateY(180deg);
  background: var(--card-front-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 3px solid rgba(0,0,0,0.1);
}
.card-img {
  width: 85%; height: 75%;
  object-fit: contain;
  border-radius: 0.5rem;
}
.card-matched-overlay {
  position: absolute; inset: 0;
  border-radius: 0.8rem;
  background: rgba(0,200,100,0.3);
  display: none;
  align-items: center; justify-content: center;
  font-size: 2.5rem;
}
.card-matched-overlay.show { display: flex; }

/* ── MODAL ── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center; justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal-box {
  background: var(--surface);
  border: 2px solid var(--gold);
  border-radius: 2rem;
  padding: 3rem 2rem;
  text-align: center;
  max-width: 400px; width: 90%;
}
#modal-trophy { font-size: 4rem; margin-bottom: 1rem; }
#modal-winner { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 1.5rem; }
.modal-scores { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
.modal-score-item { text-align: center; padding: 0.8rem 1.5rem; border-radius: 1rem; }
.modal-score-item.a { background: rgba(59,130,246,0.2); color: var(--team-a); border: 1px solid var(--team-a); }
.modal-score-item.b { background: rgba(239,68,68,0.2); color: var(--team-b); border: 1px solid var(--team-b); }
.modal-score-name { font-size: 0.85rem; font-weight: 700; }
.modal-score-num { font-size: 2rem; font-weight: 900; }
.modal-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.modal-btn {
  padding: 0.7rem 1.5rem; border-radius: 1rem; border: none;
  font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: transform 0.2s;
}
.modal-btn:hover { transform: scale(1.05); }
.modal-btn.primary { background: var(--gold); color: #1a1a2e; }
.modal-btn.secondary { background: var(--surface); color: #f1f5f9; border: 1px solid rgba(255,255,255,0.2); }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  top: -10px;
  animation: confetti-fall 3s ease-in forwards;
  z-index: 200;
}
@keyframes confetti-fall {
  to { top: 110vh; transform: rotate(720deg); }
}
</style>
</head>
<body>

<!-- 사이드 바 (팀 구별) -->
<div class="team-side-bar left"></div>
<div class="team-side-bar right"></div>

<!-- HEADER -->
<div id="header">
  <a href="index.html" id="home-btn">🏠 메인허브</a>
  <h1>✝ 성경 카드 기억 게임</h1>
  <button id="back-btn" onclick="goBack()">◀ 뒤로</button>
</div>

<!-- SCOREBOARD (hidden initially) -->
<div id="scoreboard" style="display:none">
  <div class="score-box a" id="score-a">
    <div class="score-team-name" id="name-a-score">A팀</div>
    <div class="score-num" id="score-num-a">0</div>
  </div>
  <div id="turn-indicator">⏳ 준비 중</div>
  <div class="score-box b" id="score-b">
    <div class="score-team-name" id="name-b-score">B팀</div>
    <div class="score-num" id="score-num-b">0</div>
  </div>
</div>

<!-- SCREEN 1: DIFFICULTY -->
<div class="screen active" id="difficulty-screen">
  <div id="difficulty-title">난이도 선택</div>
  <div id="difficulty-sub">팀과 함께 성경 인물을 맞춰보세요!</div>
  <div class="diff-cards">
    <div class="diff-card easy" onclick="selectDifficulty('easy')">
      <div class="diff-icon">✝️</div>
      <div class="diff-name">목동</div>
      <div class="diff-desc">6쌍 (12장)<br>초보자에게 적합</div>
      <div class="diff-badge">EASY</div>
    </div>
    <div class="diff-card mid" onclick="selectDifficulty('mid')">
      <div class="diff-icon">📖</div>
      <div class="diff-name">제자</div>
      <div class="diff-desc">9쌍 (18장)<br>중급자에게 적합</div>
      <div class="diff-badge">NORMAL</div>
    </div>
    <div class="diff-card hard" onclick="selectDifficulty('hard')">
      <div class="diff-icon">🌟</div>
      <div class="diff-name">사도</div>
      <div class="diff-desc">12쌍 (24장)<br>고급자에게 적합</div>
      <div class="diff-badge">HARD</div>
    </div>
  </div>
</div>

<!-- SCREEN 2: TEAM INPUT -->
<div class="screen" id="team-screen">
  <h2>👥 팀 이름 입력</h2>
  <p class="team-subtitle">각 팀의 이름을 입력하고 게임을 시작하세요!</p>
  <div class="team-inputs">
    <div class="team-input-box a">
      <div class="team-badge a">A</div>
      <label class="team-a-label">🔵 A팀 이름</label>
      <input type="text" id="team-a-input" placeholder="A팀" maxlength="10">
    </div>
    <div class="team-input-box b">
      <div class="team-badge b">B</div>
      <label class="team-b-label">🔴 B팀 이름</label>
      <input type="text" id="team-b-input" placeholder="B팀" maxlength="10">
    </div>
  </div>
  <button id="start-game-btn" onclick="startGame()">🎮 게임 시작!</button>
</div>

<!-- SCREEN 3: GAME -->
<div class="screen" id="game-screen">
  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-trophy">🏆</div>
    <div id="modal-winner"></div>
    <div class="modal-scores">
      <div class="modal-score-item a">
        <div class="modal-score-name" id="final-a-name">A팀</div>
        <div class="modal-score-num" id="final-a">0</div>
        <div style="font-size:0.75rem;opacity:0.7">쌍</div>
      </div>
      <div class="modal-score-item b">
        <div class="modal-score-name" id="final-b-name">B팀</div>
        <div class="modal-score-num" id="final-b">0</div>
        <div style="font-size:0.75rem;opacity:0.7">쌍</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="restartGame()">🔄 다시 하기</button>
      <button class="modal-btn secondary" onclick="goToTitle()">📋 난이도 선택</button>
      <button class="modal-btn secondary" onclick="location.href='index.html'">🏠 메인허브</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const ALL_CHARACTERS = [
  { name: '아브라함', img: 'abraham.png' },
  { name: '다니엘',   img: 'daniel.png'  },
  { name: '다윗',     img: 'david.png'   },
  { name: '에스더',   img: 'esther.png'  },
  { name: '예수님',   img: 'jesus.png'   },
  { name: '요나',     img: 'jonah.png'   },
  { name: '요셉',     img: 'joseph.png'  },
  { name: '리디아',   img: 'lydia.png'   },
  { name: '모세',     img: 'moses.png'   },
  { name: '노아',     img: 'noah.png'    },
  { name: '바울',     img: 'paul.png'    },
  { name: '삼손',     img: 'samson.png'  },
];

const CONFIGS = {
  easy: { pairs: 6,  cols: 4, rows: 3 },
  mid:  { pairs: 9,  cols: 6, rows: 3 },
  hard: { pairs: 12, cols: 6, rows: 4 },
};

// ── STATE ──
let currentDiff = null;
let teamA = 'A팀', teamB = 'B팀';
let scoreA = 0, scoreB = 0;
let currentTurn = 'a';
let cards = [];
let flippedCards = [];
let locked = false;
let historyStack = ['difficulty'];

// ── NAV ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack() {
  if (historyStack.length > 1) {
    historyStack.pop();
    const prev = historyStack[historyStack.length - 1];
    showScreen(prev + '-screen');
    if (prev !== 'game') {
      document.getElementById('scoreboard').style.display = 'none';
      document.body.className = '';
    }
  } else {
    location.href = 'index.html';
  }
}

function goToTitle() {
  document.getElementById('modal-overlay').classList.remove('show');
  historyStack = ['difficulty'];
  showScreen('difficulty-screen');
  document.getElementById('scoreboard').style.display = 'none';
  document.body.className = '';
}

// ── DIFFICULTY ──
function selectDifficulty(diff) {
  currentDiff = diff;
  historyStack.push('team');
  showScreen('team-screen');
}

// ── START ──
function startGame() {
  teamA = document.getElementById('team-a-input').value.trim() || 'A팀';
  teamB = document.getElementById('team-b-input').value.trim() || 'B팀';
  scoreA = 0; scoreB = 0;
  currentTurn = 'a';
  flippedCards = [];
  locked = false;

  document.getElementById('name-a-score').textContent = teamA;
  document.getElementById('name-b-score').textContent = teamB;
  document.getElementById('score-num-a').textContent = '0';
  document.getElementById('score-num-b').textContent = '0';
  document.getElementById('final-a-name').textContent = teamA;
  document.getElementById('final-b-name').textContent = teamB;

  document.getElementById('scoreboard').style.display = 'flex';

  historyStack.push('game');
  showScreen('game-screen');
  buildBoard(CONFIGS[currentDiff]);
  updateTurnUI();
}

// ── TURN UI ──
function updateTurnUI() {
  const boxA = document.getElementById('score-a');
  const boxB = document.getElementById('score-b');
  const indicator = document.getElementById('turn-indicator');

  if (currentTurn === 'a') {
    boxA.classList.add('active-turn');
    boxB.classList.remove('active-turn');
    indicator.textContent = '🔵 ' + teamA + ' 차례';
    document.body.className = 'turn-a';
  } else {
    boxB.classList.add('active-turn');
    boxA.classList.remove('active-turn');
    indicator.textContent = '🔴 ' + teamB + ' 차례';
    document.body.className = 'turn-b';
  }
}

// ── SHUFFLE ──
function fisherYates(arr) {
  arr = [...arr];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── BUILD BOARD ──
function buildBoard(cfg) {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = 'repeat(' + cfg.cols + ', 1fr)';
  board.innerHTML = '';

  const selected = fisherYates([...ALL_CHARACTERS]).slice(0, cfg.pairs);
  cards = fisherYates([...selected, ...selected].map((c, i) => ({
    ...c, uid: i, matched: false, matchedBy: null
  })));

  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="card-back-bg"></div>
          <span class="card-back-corner tl">✝</span>
          <span class="card-back-corner tr">✝</span>
          <span class="card-back-corner bl">✝</span>
          <span class="card-back-corner br">✝</span>
          <div class="card-back-pattern"></div>
          <div class="card-number">${idx + 1}</div>
        </div>
        <div class="card-face card-front" id="front-${idx}">
          <img src="${card.img}" alt="${card.name}" class="card-img" loading="lazy">
          <div class="card-matched-overlay" id="overlay-${idx}"></div>
        </div>
      </div>
    `;
    el.addEventListener('click', () => onCardClick(idx, el));
    board.appendChild(el);
  });
}

// ── CARD CLICK ──
function onCardClick(idx, el) {
  if (locked) return;
  if (cards[idx].matched) return;
  if (flippedCards.some(f => f.idx === idx)) return;
  if (flippedCards.length >= 2) return;

  el.classList.add('flipped');
  flippedCards.push({ idx, el });

  if (flippedCards.length === 2) {
    locked = true;
    const [a, b] = flippedCards;
    const cardA = cards[a.idx];
    const cardB = cards[b.idx];

    if (cardA.name === cardB.name) {
      setTimeout(() => {
        cards[a.idx].matched = true;
        cards[b.idx].matched = true;
        document.getElementById('overlay-' + a.idx).classList.add('show');
        document.getElementById('overlay-' + b.idx).classList.add('show');

        if (currentTurn === 'a') {
          scoreA++;
          document.getElementById('score-num-a').textContent = scoreA;
        } else {
          scoreB++;
          document.getElementById('score-num-b').textContent = scoreB;
        }

        flippedCards = [];
        locked = false;

        if (cards.every(c => c.matched)) {
          setTimeout(showResult, 500);
        }
      }, 600);
    } else {
      setTimeout(() => {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
        currentTurn = currentTurn === 'a' ? 'b' : 'a';
        updateTurnUI();
      }, 1000);
    }
  }
}

// ── RESULT ──
function showResult() {
  let winner, emoji;
  if (scoreA > scoreB) {
    winner = teamA + ' 승리! 🎉'; emoji = '🏆';
  } else if (scoreB > scoreA) {
    winner = teamB + ' 승리! 🎉'; emoji = '🏆';
  } else {
    winner = '무승부! 🤝'; emoji = '🤝';
  }

  document.getElementById('modal-trophy').textContent = emoji;
  document.getElementById('modal-winner').textContent = winner;
  document.getElementById('final-a').textContent = scoreA + '쌍';
  document.getElementById('final-b').textContent = scoreB + '쌍';
  document.getElementById('modal-overlay').classList.add('show');
  launchConfetti();
}

// ── RESTART ──
function restartGame() {
  document.getElementById('modal-overlay').classList.remove('show');
  scoreA = 0; scoreB = 0;
  currentTurn = 'a';
  document.getElementById('score-num-a').textContent = '0';
  document.getElementById('score-num-b').textContent = '0';
  buildBoard(CONFIGS[currentDiff]);
  updateTurnUI();
}

// ── CONFETTI ──
function launchConfetti() {
  const colors = ['#e2b96f','#3b82f6','#ef4444','#4caf50','#a78bfa','#ffd700'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}
</script>
