<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Card Memory - PBG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --primary: #0f3460;
  --gold: #e2b96f;
  --gold-dark: #c49a4f;
  --team-a: #3b82f6;
  --team-b: #ef4444;
  --card-back-bg: #fffde7;
  --card-front-bg: #fdf6e3;
  --cream: #fdf6e3;
  --sky: #87ceeb;
  --text: #1e293b;
  --card-size: min(calc((100vw - 72px) / 6), calc((100vh - 172px) / 4));
}
body {
  font-family: 'Pretendard', system-ui, sans-serif;
  background: var(--bg);
  color: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ── */
#header {
  width: 100%;
  background: var(--surface);
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
}
#header h1 { font-size: 1.2rem; color: var(--gold); }
#back-btn {
  background: none; border: 1px solid var(--gold);
  color: var(--gold); padding: 0.3rem 0.8rem;
  border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem;
}
#back-btn:hover { background: var(--gold); color: #000; }

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 900px; padding: 2rem 1rem; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ── MAIN SCREEN (difficulty) ── */
#difficulty-title { font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; text-align: center; }
#difficulty-sub { font-size: 0.95rem; opacity: 0.7; margin-bottom: 2rem; text-align: center; }
.diff-cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
.diff-card {
  background: var(--surface);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 1.5rem;
  padding: 2rem 1.5rem;
  width: 220px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}
.diff-card:hover { transform: translateY(-8px); }
.diff-card.easy:hover { border-color: #4caf50; box-shadow: 0 0 20px #4caf5066; }
.diff-card.mid:hover { border-color: #ffd700; box-shadow: 0 0 20px #ffd70066; }
.diff-card.hard:hover { border-color: #ef4444; box-shadow: 0 0 20px #ef444466; }
.diff-icon { font-size: 3rem; margin-bottom: 0.8rem; }
.diff-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.4rem; }
.diff-desc { font-size: 0.8rem; opacity: 0.7; }
.diff-badge {
  display: inline-block; margin-top: 1rem;
  padding: 0.3rem 1rem; border-radius: 1rem;
  font-size: 0.75rem; font-weight: 700;
}
.easy .diff-badge { background: #4caf50; color: #fff; }
.mid .diff-badge { background: #ffd700; color: #000; }
.hard .diff-badge { background: #ef4444; color: #fff; }

/* ── TEAM INPUT SCREEN ── */
#team-screen h2 { font-size: 1.5rem; color: var(--gold); margin-bottom: 1.5rem; }
.team-inputs { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
.team-input-box {
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}
.team-input-box label { font-size: 0.9rem; font-weight: 700; }
.team-a-label { color: var(--team-a); }
.team-b-label { color: var(--team-b); }
.team-input-box input {
  padding: 0.6rem 1rem; border-radius: 0.8rem;
  border: 2px solid rgba(255,255,255,0.2);
  background: var(--surface); color: #fff;
  font-size: 1rem; text-align: center; width: 180px;
}
.team-input-box.a input:focus { border-color: var(--team-a); outline: none; }
.team-input-box.b input:focus { border-color: var(--team-b); outline: none; }
#start-game-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e; border: none; padding: 0.8rem 2.5rem;
  border-radius: 1rem; font-size: 1rem; font-weight: 900;
  cursor: pointer; transition: transform 0.2s;
}
#start-game-btn:hover { transform: scale(1.05); }

/* ── SCOREBOARD ── */
#scoreboard {
  width: 100%; max-width: 900px;
  display: flex; gap: 1rem; padding: 0.8rem 1rem;
  justify-content: space-between; align-items: center;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.score-box {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 0.5rem 1rem; border-radius: 0.8rem;
  transition: all 0.3s;
}
.score-box.active-turn { transform: scale(1.05); }
.score-box.a { border: 2px solid var(--team-a); }
.score-box.b { border: 2px solid var(--team-b); }
.score-box.a.active-turn { background: rgba(59,130,246,0.15); box-shadow: 0 0 12px var(--team-a); }
.score-box.b.active-turn { background: rgba(239,68,68,0.15); box-shadow: 0 0 12px var(--team-b); }
.score-team-name { font-size: 0.85rem; font-weight: 700; }
.score-num { font-size: 2rem; font-weight: 900; }
.score-box.a .score-team-name { color: var(--team-a); }
.score-box.b .score-team-name { color: var(--team-b); }
.score-box.a .score-num { color: var(--team-a); }
.score-box.b .score-num { color: var(--team-b); }
#turn-indicator {
  font-size: 0.85rem; text-align: center; opacity: 0.9;
  padding: 0.3rem 0.6rem; background: rgba(255,255,255,0.05);
  border-radius: 0.5rem;
}

/* ── GAME BOARD ── */
#game-screen { gap: 0; padding: 0; }
#board-wrap { width: 100%; max-width: 100%; padding: 0.8rem 1rem; }
#board {
  display: grid;
  gap: 8px;
  justify-content: center;
}

/* ── CARDS ── */
.card {
  width: var(--card-size); height: var(--card-size);
  cursor: pointer;
  perspective: 600px;
  position: relative;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 0.8rem;
  overflow: hidden;
}

/* BACK FACE */
.card-back {
  transform: rotateY(180deg);
  /* position: absolute는 .card-face에서 이미 설정됨 */
  background: linear-gradient(145deg, #b8d9f0 0%, #87c3e8 40%, #a8d4f0 100%);
  border: 4px solid #f0c040;
  box-shadow:
    inset 0 0 0 3px #fff,
    0 6px 16px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.12) 18px, rgba(255,255,255,0.12) 20px),
    repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.12) 18px, rgba(255,255,255,0.12) 20px);
  pointer-events: none;
  z-index: 0;
}
.card-back-pattern {
  display: flex !important;
  position: absolute;
  width: 72%; height: 72%;
  border-radius: 50%;
  background: radial-gradient(circle, #f5f0e0 0%, #ddeeff 55%, transparent 75%);
  border: 2px solid rgba(100,160,220,0.4);
  box-shadow: 0 0 0 4px rgba(100,160,220,0.15);
  align-items: center;
  justify-content: center;
  z-index: 1;
  overflow: visible;
}
.card-back-pattern::before {
  content: '';
  position: absolute;
  width: 80%; height: 80%;
  border-radius: 50%;
  border: 1.5px dashed rgba(100,160,220,0.35);
}
.card-back-corner {
  position: absolute;
  font-size: calc(var(--card-size) * 0.11);
  line-height: 1;
  z-index: 3;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}
.card-back-corner.tl { top: 5%; left: 5%; }
.card-back-corner.tr { top: 5%; right: 5%; }
.card-back-corner.bl { bottom: 5%; left: 5%; }
.card-back-corner.br { bottom: 5%; right: 5%; }
.card-number {
  font-size: calc(var(--card-size) * 0.38);
  font-weight: 900;
  font-family: 'Arial Black', 'Arial Bold', 'Impact', sans-serif;
  background: linear-gradient(180deg, #ffe57a 0%, #f5c842 40%, #e0a020 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter:
    drop-shadow(-2px -2px 0 #4a90d9)
    drop-shadow(2px -2px 0 #4a90d9)
    drop-shadow(-2px 2px 0 #4a90d9)
    drop-shadow(2px 2px 0 #4a90d9)
    drop-shadow(0 3px 5px rgba(30,80,160,0.4));
  position: relative;
  z-index: 2;
  line-height: 1;
}
/* FRONT FACE */
.card-front {
  overflow: hidden;
  padding: 0;
}
.card-matched-overlay { position: absolute; inset: 0; border-radius: 8px; pointer-events: none; border: 5px solid transparent; transition: border-color 0.3s; }
.card-front.matched-a { border: 5px solid var(--team-a); box-shadow: 0 0 16px var(--team-a); }
.card-front.matched-b { border: 5px solid var(--team-b); box-shadow: 0 0 16px var(--team-b); }
.card-church-top {
  background: linear-gradient(180deg, #6b4226 0%, #8B5E3C 100%);
  height: 22px; display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; letter-spacing: 2px; color: rgba(255,255,255,0.8);
}
.card-front > .card-img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 8px; }
.card-church-bottom {
  background: linear-gradient(180deg, #8B5E3C 0%, #6b4226 100%);
  min-height: 36px; padding: 0.2rem 0.3rem;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.card-name { font-size: calc(var(--card-size) * 0.1); font-weight: 900; color: #fff8e1; line-height: 1.1; }
.card-subtitle { font-size: calc(var(--card-size) * 0.07); color: rgba(255,248,225,0.8); text-align: center; line-height: 1.2; }

/* ── MODAL ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal {
  background: var(--surface);
  border: 2px solid var(--gold);
  border-radius: 2rem;
  padding: 2.5rem 2rem;
  text-align: center;
  max-width: 420px; width: 90%;
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#modal-trophy { font-size: 5rem; margin-bottom: 1rem; }
#modal-title { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 0.5rem; }
#modal-winner { font-size: 1.2rem; margin-bottom: 1.5rem; }
.score-summary { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
.final-score {
  padding: 0.8rem 1.5rem; border-radius: 1rem;
  font-weight: 700; font-size: 1rem;
}
.final-score.a { background: rgba(59,130,246,0.2); border: 2px solid var(--team-a); color: var(--team-a); }
.final-score.b { background: rgba(239,68,68,0.2); border: 2px solid var(--team-b); color: var(--team-b); }
.modal-btns { display: flex; gap: 1rem; justify-content: center; }
.modal-btn {
  padding: 0.7rem 1.5rem; border-radius: 1rem;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none;
  transition: transform 0.2s;
}
.modal-btn:hover { transform: scale(1.05); }
#btn-replay { background: var(--gold); color: #1a1a2e; }
#btn-home { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

/* confetti */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  top: -10px;
  animation: confettiFall linear forwards;
  z-index: 99;
  border-radius: 2px;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

@media (max-width: 600px) {
  :root { --card-size: min(calc((100vw - 40px) / 4), calc((100vh - 160px) / 5)); }
  #board { gap: 6px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button id="back-btn" onclick="goHome()">&#8592; 홈</button>
  <h1>✝️ Bible Card Memory</h1>
  <div style="width:60px"></div>
</div>

<!-- SCOREBOARD (hidden until game) -->
<div id="scoreboard" style="display:none">
  <div class="score-box a" id="score-a">
    <div class="score-team-name" id="name-a">믿음 팀</div>
    <div class="score-num" id="pts-a">0</div>
  </div>
  <div id="turn-indicator">게임 시작!</div>
  <div class="score-box b" id="score-b">
    <div class="score-team-name" id="name-b">소망 팀</div>
    <div class="score-num" id="pts-b">0</div>
  </div>
</div>

<!-- SCREEN: DIFFICULTY -->
<div id="diff-screen" class="screen active">
  <div id="difficulty-title">난이도를 선택하세요</div>
  <div id="difficulty-sub">성경 인물들의 카드를 짝 맞춰 팀 대결!</div>
  <div class="diff-cards">
    <div class="diff-card easy" onclick="selectDiff('easy')">
      <div class="diff-icon">🟢</div>
      <div class="diff-name">목동 모드</div>
      <div class="diff-desc">총 8장 (4쌍)<br>1×4 배치</div>
      <div class="diff-badge">초급</div>
    </div>
    <div class="diff-card mid" onclick="selectDiff('mid')">
      <div class="diff-icon">🟡</div>
      <div class="diff-name">제자 모드</div>
      <div class="diff-desc">총 16장 (8쌍)<br>4×4 그리드</div>
      <div class="diff-badge">중급</div>
    </div>
    <div class="diff-card hard" onclick="selectDiff('hard')">
      <div class="diff-icon">🔴</div>
      <div class="diff-name">사도 모드</div>
      <div class="diff-desc">총 24장 (12쌍)<br>6×4 그리드</div>
      <div class="diff-badge">고급</div>
    </div>
  </div>
</div>

<!-- SCREEN: TEAM INPUT -->
<div id="team-screen" class="screen">
  <h2>팀 이름을 입력하세요</h2>
  <div class="team-inputs">
    <div class="team-input-box a">
      <label class="team-a-label">🔵 A팀 (Blue)</label>
      <input id="input-a" type="text" value="믿음 팀" maxlength="10">
    </div>
    <div class="team-input-box b">
      <label class="team-b-label">🔴 B팀 (Red)</label>
      <input id="input-b" type="text" value="소망 팀" maxlength="10">
    </div>
  </div>
  <button id="start-game-btn" onclick="startGame()">게임 시작! 🎮</button>
</div>

<!-- SCREEN: GAME -->
<div id="game-screen" class="screen">
  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-trophy">🏆</div>
    <div id="modal-title">게임 종료!</div>
    <div id="modal-winner"></div>
    <div class="score-summary">
      <div class="final-score a" id="final-a"></div>
      <div class="final-score b" id="final-b"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="btn-replay" onclick="replayGame()">다시하기</button>
      <button class="modal-btn" id="btn-home" onclick="goHome()">홈으로</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const ALL_CHARACTERS = [
  { id:1,  name:'노아',     sub:'방주 & 약속의 무지개',       img:'noah.png' },
  { id:2,  name:'예수님',   sub:'인류의 구원자 & 사랑',        img:'jesus.png' },
  { id:3,  name:'모세',     sub:'출애굽의 리더',               img:'moses.png' },
  { id:4,  name:'다윗',     sub:'믿음의 물매돌',               img:'david.png' },
  { id:5,  name:'다니엘',   sub:'사자굴의 기적',               img:'daniel.png' },
  { id:6,  name:'요셉',     sub:'꿈과 용서의 총리',            img:'joseph.png' },
  { id:7,  name:'요나',     sub:'물고기 뱃속의 예언자',        img:'jonah.png' },
  { id:8,  name:'삼손',     sub:'나실인 & 천하장사',           img:'samson.png' },
  { id:9,  name:'아브라함', sub:'믿음의 조상 & 많은 민족',     img:'abraham.png' },
  { id:10, name:'에스더',   sub:'이스라엘의 왕비 & 지혜',      img:'esther.png' },
  { id:11, name:'루디아',   sub:'빌립보의 성도 & 자줏옷 장사', img:'lydia.png' },
  { id:12, name:'바울',     sub:'이방인의 사도 & 서신서 작가', img:'paul.png' },
];

const DIFF_CONFIG = {
  easy: { pairs: 4,  cols: 4, rows: 2 },
  mid:  { pairs: 8,  cols: 4, rows: 4 },
  hard: { pairs: 12, cols: 6, rows: 4 },
};

// ── STATE ──
let difficulty = 'easy';
let teamA = '믿음 팀', teamB = '소망 팀';
let scoreA = 0, scoreB = 0;
let currentTurn = 'A';
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 0;
let locked = false;
let cards = [];

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectDiff(diff) {
  difficulty = diff;
  showScreen('team-screen');
}

function goHome() {
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('modal-overlay').classList.remove('show');
  showScreen('diff-screen');
}

// ── GAME START ──
function startGame() {
  teamA = document.getElementById('input-a').value.trim() || '믿음 팀';
  teamB = document.getElementById('input-b').value.trim() || '소망 팀';
  scoreA = 0; scoreB = 0;
  currentTurn = 'A';
  flippedCards = [];
  matchedPairs = 0;
  locked = false;

  const cfg = DIFF_CONFIG[difficulty];
  totalPairs = cfg.pairs;

  updateScoreboard();
  document.getElementById('scoreboard').style.display = 'flex';
  buildBoard(cfg);
  showScreen('game-screen');
}

function replayGame() {
  document.getElementById('modal-overlay').classList.remove('show');
  startGame();
}

// ── BOARD ──
function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildBoard(cfg) {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = 'repeat(' + cfg.cols + ', 1fr)';
  board.innerHTML = '';

  const selected = fisherYates([...ALL_CHARACTERS]).slice(0, cfg.pairs);
  cards = fisherYates([...selected, ...selected].map((c, i) => ({
    ...c, uid: i, matched: false, matchedBy: null
  })));

  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <span class="card-back-corner tl">⛪</span>
          <span class="card-back-corner tr">⛪</span>
          <span class="card-back-corner bl">⛪</span>
          <span class="card-back-corner br">⛪</span>
          <div class="card-back-pattern"></div>
          <div class="card-number">${idx + 1}</div>
        </div>
        <div class="card-face card-front" id="front-${idx}">
          <img src="${card.img}" alt="${card.name}" class="card-img" loading="lazy">
          <div class="card-matched-overlay" id="overlay-${idx}"></div>
        </div>
    `;
    el.addEventListener('click', () => onCardClick(idx, el));
    board.appendChild(el);
  });
}

// ── CARD CLICK ──
function onCardClick(idx, el) {
  if (locked) return;
  if (cards[idx].matched) return;
  if (flippedCards.some(f => f.idx === idx)) return;
  if (flippedCards.length >= 2) return;

  el.classList.add('flipped');
  flippedCards.push({ idx, el });

  if (flippedCards.length === 2) checkMatch();
}

function checkMatch() {
  locked = true;
  const [a, b] = flippedCards;
  const cardA = cards[a.idx];
  const cardB = cards[b.idx];

  if (cardA.id === cardB.id) {
    // MATCH
    const team = currentTurn;
    const colorClass = team === 'A' ? 'matched-a' : 'matched-b';
    [a, b].forEach(f => {
      cards[f.idx].matched = true;
      cards[f.idx].matchedBy = team;
      document.getElementById('front-' + f.idx).classList.add(colorClass);
      f.el.style.cursor = 'default';
    });
    if (team === 'A') scoreA++; else scoreB++;
    matchedPairs++;
    flippedCards = [];
    locked = false;
    updateScoreboard();
    if (matchedPairs === totalPairs) setTimeout(showResult, 400);
  } else {
    // NO MATCH
    setTimeout(() => {
      [a, b].forEach(f => f.el.classList.remove('flipped'));
      flippedCards = [];
      currentTurn = currentTurn === 'A' ? 'B' : 'A';
      locked = false;
      updateScoreboard();
    }, 1200);
  }
}

// ── SCOREBOARD ──
function updateScoreboard() {
  document.getElementById('name-a').textContent = teamA;
  document.getElementById('name-b').textContent = teamB;
  document.getElementById('pts-a').textContent = scoreA;
  document.getElementById('pts-b').textContent = scoreB;

  const boxA = document.getElementById('score-a');
  const boxB = document.getElementById('score-b');
  const indicator = document.getElementById('turn-indicator');

  if (currentTurn === 'A') {
    boxA.classList.add('active-turn'); boxB.classList.remove('active-turn');
    indicator.textContent = '🔵 ' + teamA + '의 차례';
    indicator.style.color = '#93c5fd';
  } else {
    boxB.classList.add('active-turn'); boxA.classList.remove('active-turn');
    indicator.textContent = '🔴 ' + teamB + '의 차례';
    indicator.style.color = '#fca5a5';
  }
}

// ── RESULT ──
function showResult() {
  let winner, emoji;
  if (scoreA > scoreB) {
    winner = teamA + ' 승리! 🎉'; emoji = '🏆';
  } else if (scoreB > scoreA) {
    winner = teamB + ' 승리! 🎉'; emoji = '🏆';
  } else {
    winner = '무승부! 🤝'; emoji = '🤝';
  }
  document.getElementById('modal-trophy').textContent = emoji;
  document.getElementById('modal-winner').textContent = winner;
  document.getElementById('final-a').textContent = teamA + ': ' + scoreA + '점';
  document.getElementById('final-b').textContent = teamB + ': ' + scoreB + '점';
  document.getElementById('modal-overlay').classList.add('show');
  launchConfetti();
}

// ── CONFETTI ──
function launchConfetti() {
  const colors = ['#e2b96f','#3b82f6','#ef4444','#4caf50','#a78bfa','#ffd700'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}
</script>
